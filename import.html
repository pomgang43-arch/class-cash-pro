<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นำเข้ารายชื่อ - Class Cash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-3xl">
        <h1 class="text-2xl font-bold text-sky-500 mb-2">📥 เครื่องมือนำเข้ารายชื่อนักศึกษา</h1>
        <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-4 text-sm text-amber-700">
            <strong>⚠️ คำเตือน:</strong> การกดนำเข้าจะ <u>"ลบรายชื่อและยอดเงินเดิมทั้งหมด"</u> ในฐานข้อมูลทิ้งทันที
        </div>
        <textarea id="excelData" rows="10" class="w-full p-4 border-2 rounded-xl focus:border-sky-500 mb-4 text-sm font-mono whitespace-pre" placeholder="วางข้อมูลจาก Excel ลงที่นี่...&#10;1    6601001    นาย สมชาย ใจดี (วิทยาลัยเทคโนโลยีผดุงเสนาบริหารธุรกิจ)&#10;2    6601002    นางสาว สมหญิง น่ารัก"></textarea>
        <button onclick="importToFirebase()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl shadow-md text-lg">🚀 เริ่มนำเข้าข้อมูลสู่ระบบ Firebase</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBwt6DK12lt5zTso4mTi-B3GJE7Af8y54M", authDomain: "class-cash-pro.firebaseapp.com", databaseURL: "https://class-cash-pro-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "class-cash-pro", storageBucket: "class-cash-pro.firebasestorage.app", messagingSenderId: "1001189840355", appId: "1:1001189840355:web:28343212ec5ce57cbe3cd6" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('classCashState/students');

        function importToFirebase() {
            const text = document.getElementById('excelData').value.trim();
            if (!text) return Swal.fire('Error', 'วางข้อมูลก่อนครับ', 'error');
            Swal.fire({ title: 'ยืนยันการนำเข้า?', text: "รายชื่อเก่าจะหายไปทั้งหมด!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#0ea5e9' }).then((res) => {
                if (res.isConfirmed) {
                    const lines = text.split('\n'); let newStudents = []; let sc = 0;
                    lines.forEach((line, i) => {
                        const p = line.split('\t').map(x => x.trim()).filter(x => x !== ""); 
                        if (p.length >= 2) {
                            let nameStr = p.length >= 3 ? p[1] + " " + p[2] : p[1];
                            newStudents.push({ id: Date.now()+i, no: parseInt(p[0])||p[0], name: nameStr, avatar: `https://api.dicebear.com/7.x/fun-emoji/svg?seed=${Date.now()+i}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`, classMoneyPaid: false, personalBalance: 0, pin: "0000", history: [], cumulativeDebt: 0, streak: 0, paidCount: 0 }); sc++;
                        }
                    });
                    if (sc > 0) {
                        Swal.fire({title: 'กำลังอัปโหลด...', didOpen: () => Swal.showLoading()});
                        dbRef.set(newStudents).then(() => Swal.fire('สำเร็จ!', `เพิ่ม ${sc} คนรหัสเริ่ม 0000`, 'success')).catch(err => Swal.fire('Error', err.message, 'error'));
                    } else { Swal.fire('Error', 'รูปแบบไม่ถูกต้อง', 'error'); }
                }
            })
        }
    </script>
</body>
</html>
